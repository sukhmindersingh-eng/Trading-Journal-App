<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Trading Journal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
  padding:15px;
}

h1 { text-align:center; color:#38bdf8; }

.container { max-width:1200px; margin:auto; }

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.row { display:flex; gap:10px; margin-top:10px; }

button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.add { background:#22c55e; }
.export { background:#38bdf8; }
.import { background:#a78bfa; }
.clear { background:#ef4444; }

input, select, textarea {
  width:100%;
  padding:8px;
  border-radius:6px;
  border:none;
}

.stats {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.stat {
  background:#020617;
  padding:10px;
  text-align:center;
  border-radius:8px;
}

table {
  width:100%;
  border-collapse:collapse;
}

th,td {
  padding:8px;
  border-bottom:1px solid #334155;
  text-align:center;
}

.profit { color:#22c55e; }
.loss { color:#ef4444; }

canvas {
  width:100%;
  height:150px;
  background:#020617;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>🚀 Ultimate Trading Journal</h1>

<div class="card grid">
<input type="date" id="date">
<select id="type"><option>CE</option><option>PE</option></select>

<input type="number" id="strike" placeholder="Strike Price">
<input type="number" id="lot" placeholder="Lot (Auto 50)">

<input type="time" id="buyTime">
<input type="time" id="sellTime">

<input type="number" id="buy" placeholder="Buy Premium">
<input type="number" id="sell" placeholder="Sell Premium">

<select id="strategy">
<option>Breakout</option>
<option>Reversal</option>
<option>VWAP</option>
<option>Support/Resistance</option>
</select>

<textarea id="notes" placeholder="Notes"></textarea>
</div>

<!-- BUTTON ROWS -->
<div class="row"><button class="add" onclick="addTrade()">Add Trade</button></div>
<div class="row">
<button class="export" onclick="exportCSV()">Export</button>
<button class="import" onclick="importData()">Import</button>
</div>
<div class="row"><button class="clear" onclick="clearAll()">Clear All</button></div>

<!-- FILTER -->
<div class="card">
<select id="filterStrategy" onchange="render()">
<option value="">All Strategies</option>
<option>Breakout</option>
<option>Reversal</option>
<option>VWAP</option>
<option>Support/Resistance</option>
</select>
</div>

<!-- STATS -->
<div class="stats">
<div class="stat"><h3>Total P&L</h3><p id="totalPL">0</p></div>
<div class="stat"><h3>Win Rate</h3><p id="winRate">0%</p></div>
<div class="stat"><h3>Trades</h3><p id="tradesCount">0</p></div>
<div class="stat"><h3>Max DD</h3><p id="drawdown">0</p></div>
</div>

<canvas id="equity"></canvas>

<table>
<thead>
<tr>
<th>Date</th><th>Type</th><th>Strike</th><th>Lot</th>
<th>Buy</th><th>Sell</th><th>P&L</th><th>X</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

</div>

<script>
let trades = JSON.parse(localStorage.getItem("trades")) || [];

function addTrade(){
  let lotVal = +lot.value || 50;

  let t = {
    date:date.value,
    type:type.value,
    strike:+strike.value,
    lot:lotVal,
    buy:+buy.value,
    sell:+sell.value,
    strategy:strategy.value
  };

  t.pl = (t.sell - t.buy)*t.lot - (t.buy+t.sell)*t.lot*0.002;

  trades.push(t);
  localStorage.setItem("trades",JSON.stringify(trades));
  render();
}

function del(i){
  trades.splice(i,1);
  localStorage.setItem("trades",JSON.stringify(trades));
  render();
}

function clearAll(){
  if(confirm("Clear all?")){
    trades=[];
    localStorage.clear();
    render();
  }
}

function render(){
  let html="", total=0, win=0, equity=[], max=0, dd=0;

  let filter = filterStrategy.value;

  let filtered = trades.filter(t => !filter || t.strategy===filter);

  filtered.forEach((t,i)=>{
    total+=t.pl;
    equity.push(total);
    max = Math.max(max,total);
    dd = Math.min(dd,total-max);

    if(t.pl>0) win++;

    html+=`
    <tr>
      <td>${t.date}</td>
      <td>${t.type}</td>
      <td>${t.strike}</td>
      <td>${t.lot}</td>
      <td>${t.buy}</td>
      <td>${t.sell}</td>
      <td class="${t.pl>=0?'profit':'loss'}">${t.pl.toFixed(2)}</td>
      <td><button onclick="del(${i})">X</button></td>
    </tr>`;
  });

  body.innerHTML=html;
  totalPL.innerText=total.toFixed(2);
  tradesCount.innerText=filtered.length;
  winRate.innerText = filtered.length ? ((win/filtered.length)*100).toFixed(1)+"%" : "0%";
  drawdown.innerText = dd.toFixed(2);

  drawChart(equity);
}

function drawChart(data){
  let c=document.getElementById("equity");
  let ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  ctx.beginPath();
  ctx.strokeStyle="#38bdf8";

  data.forEach((v,i)=>{
    let x=i*(c.width/data.length);
    let y=c.height - (v/Math.max(...data))*c.height;
    if(i==0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.stroke();
}

function exportCSV(){
  let blob=new Blob([JSON.stringify(trades)]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="backup.json";
  a.click();
}

function importData(){
  let inp=document.createElement("input");
  inp.type="file";
  inp.onchange=e=>{
    let file=e.target.files[0];
    let reader=new FileReader();
    reader.onload=()=>{
      trades=JSON.parse(reader.result);
      localStorage.setItem("trades",JSON.stringify(trades));
      render();
    };
    reader.readAsText(file);
  };
  inp.click();
}

render();
</script>

</body>
</html>
