<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#f8fafc,#e2e8f0);
  color:#0f172a;
  padding:15px;
}

h1 {
  text-align:center;
  color:#6366f1;
}

.container {
  max-width:1200px;
  margin:auto;
}

/* CARD */
.card {
  background:#ffffff;
  padding:15px;
  border-radius:16px;
  margin-bottom:20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* INPUT GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

/* INPUT STYLE (SEPARATED LOOK) */
input, select, textarea {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#f1f5f9;
  box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05),
              inset -2px -2px 5px rgba(255,255,255,0.7);
}

/* BUTTON ROW */
.row {
  display:flex;
  gap:15px;
  margin-top:15px;
}

/* 3D BUTTON STYLE */
button {
  flex:1;
  padding:12px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
  box-shadow: 0 6px 0 rgba(0,0,0,0.15);
}

/* PRESS EFFECT */
button:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 rgba(0,0,0,0.2);
}

/* PASTEL COLORS */
.add { background:#bbf7d0; }
.export { background:#bfdbfe; }
.import { background:#e9d5ff; }
.clear { background:#fecaca; }

/* STATS */
.stats {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.stat {
  background:#ffffff;
  padding:12px;
  border-radius:14px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th, td {
  padding:10px;
  text-align:center;
  border-bottom:1px solid #e2e8f0;
}

.profit { color:#16a34a; }
.loss { color:#dc2626; }

canvas {
  background:#ffffff;
  border-radius:12px;
  margin-top:15px;
}
</style>
