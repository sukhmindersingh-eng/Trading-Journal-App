<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trading Journal</title>

<style>
body {
  font-family: Arial;
  background: #0f2f2f;
  color: white;
  padding: 20px;
}

input, select {
  height: 40px;
  width: 100%;
  margin: 5px 0;
  background: #F2CDC5;
  border: none;
  border-radius: 5px;
}

button {
  height: 40px;
  margin-top: 10px;
  width: 100%;
}

table {
  width: 100%;
  margin-top: 20px;
  border-spacing: 5px;
}

th {
  background: #B97A71;
  color: white;
  padding: 8px;
}

td {
  background: #F2CDC5;
  color: black;
  padding: 8px;
  text-align: center;
}
</style>
</head>

<body>

<h2>Trading Journal</h2>

<input type="hidden" id="editIndex">

<input id="date" type="date">
<input id="day" placeholder="Day">
<select id="underlying">
<option>NIFTY</option>
<option>SENSEX</option>
</select>
<input id="strike" placeholder="Strike">
<input id="qty" placeholder="Qty">
<input id="buy" placeholder="Buy Price">
<input id="sell" placeholder="Sell Price">

<button onclick="saveTrade()">Save Trade</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Day</th>
<th>Underlying</th>
<th>Strike</th>
<th>Qty</th>
<th>Buy</th>
<th>Sell</th>
<th>P/L</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
function saveTrade() {
  let trades = JSON.parse(localStorage.getItem("trades") || "[]");

  let t = {
    date: date.value,
    day: day.value,
    underlying: underlying.value,
    strike: strike.value,
    qty: Number(qty.value),
    buy: Number(buy.value),
    sell: Number(sell.value)
  };

  t.pl = (t.sell - t.buy) * t.qty;

  if (editIndex.value !== "") {
    trades[editIndex.value] = t;
    editIndex.value = "";
  } else {
    trades.push(t);
  }

  localStorage.setItem("trades", JSON.stringify(trades));
  render();
}

function render() {
  let trades = JSON.parse(localStorage.getItem("trades") || "[]");
  let tbody = document.getElementById("tbody");

  tbody.innerHTML = "";

  for (let i = 0; i < trades.length; i++) {
    let t = trades[i];

    let tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${t.date}</td>
      <td>${t.day}</td>
      <td>${t.underlying}</td>
      <td>${t.strike}</td>
      <td>${t.qty}</td>
      <td>${t.buy}</td>
      <td>${t.sell}</td>
      <td>${t.pl}</td>
      <td>
        <button onclick="edit(${i})">Edit</button>
        <button onclick="del(${i})">Delete</button>
      </td>
    `;

    tbody.appendChild(tr);
  }
}

/* EDIT WORKING */
function edit(i) {
  let t = JSON.parse(localStorage.getItem("trades"))[i];

  date.value = t.date;
  day.value = t.day;
  underlying.value = t.underlying;
  strike.value = t.strike;
  qty.value = t.qty;
  buy.value = t.buy;
  sell.value = t.sell;

  editIndex.value = i;
}

/* DELETE WORKING */
function del(i) {
  let trades = JSON.parse(localStorage.getItem("trades") || "[]");

  trades.splice(i, 1);
  localStorage.setItem("trades", JSON.stringify(trades));

  render();
}

render();
</script>

</body>
</html>
