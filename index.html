<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trading Journal Pro+</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4f46e5">

<!-- ICON -->
<link rel="apple-touch-icon" href="icon.PNG">
<link rel="apple-touch-icon" sizes="180x180" href="icon.PNG">

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:-apple-system; background:#f8fafc; }

.header { text-align:center; padding:12px; font-weight:bold; color:#4f46e5; }

.screen { display:none; padding:12px; }
.active { display:block; }

.card {
 background:white;
 padding:12px;
 border-radius:14px;
 margin-bottom:12px;
}

.grid {
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

input, textarea {
 padding:10px;
 border-radius:10px;
 border:none;
 background:#f1f5f9;
}

button {
 width:100%;
 padding:12px;
 border:none;
 border-radius:14px;
 margin-top:8px;
}

.nav {
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 background:white;
}
.nav button { flex:1; }
</style>
</head>

<body>

<div class="header">📊 Trading Journal Pro+</div>

<!-- DASHBOARD -->
<div id="dash" class="screen active">
<div class="card">
P&L: <b id="pl">0</b><br>
Win%: <b id="win">0</b><br>
Trades: <b id="count">0</b><br>
Max DD: <b id="dd">0</b>
</div>

<div class="card">
<canvas id="equityChart"></canvas>
</div>

<div class="card">
<canvas id="dailyChart"></canvas>
</div>

<div class="card">
<canvas id="winChart"></canvas>
</div>

</div>

<!-- ADD -->
<div id="add" class="screen">
<div class="card">

<div class="grid">
<input type="date" id="date">
<input type="number" id="strike" placeholder="Strike">
<input type="number" id="lot" placeholder="Lot">
<input type="number" id="buy" placeholder="Buy">
<input type="number" id="sell" placeholder="Sell">
<textarea id="notes" placeholder="Notes"></textarea>
</div>

<button onclick="addTrade()">Add Trade</button>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('dash')">🏠</button>
<button onclick="show('add')">➕</button>
</div>

<script>
let trades = JSON.parse(localStorage.getItem("t"))||[];

function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function addTrade(){
 let t={
  date:date.value,
  pl:(sell.value-buy.value)*(lot.value||50)
 };
 trades.push(t);
 localStorage.setItem("t",JSON.stringify(trades));
 render();
}

function render(){
 let total=0, win=0, equity=[], dates=[], daily={};
 let peak=0, dd=0;

 trades.forEach(t=>{
  total+=t.pl;
  equity.push(total);
  dates.push(t.date);

  if(t.pl>0) win++;

  daily[t.date]=(daily[t.date]||0)+t.pl;

  if(total>peak) peak=total;
  let draw=peak-total;
  if(draw>dd) dd=draw;
 });

 pl.innerText=total;
 count.innerText=trades.length;
 win.innerText=((win/trades.length)*100||0).toFixed(0);
 document.getElementById("dd").innerText=dd;

 // Equity Chart
 new Chart(document.getElementById("equityChart"),{
  type:"line",
  data:{labels:dates,datasets:[{data:equity}]}
 });

 // Daily Chart
 new Chart(document.getElementById("dailyChart"),{
  type:"bar",
  data:{labels:Object.keys(daily),datasets:[{data:Object.values(daily)}]}
 });

 // Win/Loss Chart
 new Chart(document.getElementById("winChart"),{
  type:"pie",
  data:{
   labels:["Win","Loss"],
   datasets:[{data:[win,trades.length-win]}]
  }
 });
}

render();

if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
