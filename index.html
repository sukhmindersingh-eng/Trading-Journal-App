<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elite Trading Desk</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">

<link rel="apple-touch-icon" href="icon.PNG">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body {
 margin:0;
 font-family:-apple-system;
 background:#0f172a;
 color:#e2e8f0;
}

.header {
 text-align:center;
 padding:14px;
 font-weight:600;
 font-size:18px;
}

.screen { display:none; padding:12px; }
.active { display:block; }

.card {
 background:#1e293b;
 padding:14px;
 border-radius:16px;
 margin-bottom:12px;
 box-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.grid {
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

input, select, textarea {
 padding:10px;
 border-radius:10px;
 border:none;
 background:#334155;
 color:white;
}

button {
 padding:12px;
 border:none;
 border-radius:14px;
 margin-top:8px;
 width:100%;
}

.green { background:#22c55e; }
.blue { background:#3b82f6; }
.red { background:#ef4444; }

.nav {
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 background:#1e293b;
}
.nav button {
 flex:1;
 background:none;
 color:white;
}

.alert { color:#f87171; font-weight:bold; }
</style>
</head>

<body>

<div class="header">🌙 Elite Trading Desk</div>

<!-- DASHBOARD -->
<div id="dash" class="screen active">

<div class="card">
P&L: <b id="pl">0</b><br>
Win%: <b id="win">0</b><br>
Trades: <b id="count">0</b><br>
Max DD: <b id="dd">0</b>
</div>

<div class="card">
<h3>🤖 AI Coach</h3>
<p id="coach"></p>
<p class="alert" id="alert"></p>
</div>

<div class="card"><canvas id="equity"></canvas></div>

</div>

<!-- ADD -->
<div id="add" class="screen">
<div class="card">

<div class="grid">
<input type="date" id="date">
<input type="number" id="strike" placeholder="Strike">

<input type="number" id="lot" placeholder="Lot">
<input type="number" id="buy" placeholder="Buy">

<input type="number" id="sell" placeholder="Sell">
<input type="number" id="risk" placeholder="Risk ₹">
</div>

<button class="green" onclick="addTrade()">Add Trade</button>
<button class="blue" onclick="syncCloud()">☁️ Sync Cloud</button>
<button class="red" onclick="clearAll()">Reset</button>

</div>
</div>

<div class="nav">
<button onclick="show('dash')">📊</button>
<button onclick="show('add')">➕</button>
</div>

<script>
// 🔹 FIREBASE CONFIG (PASTE YOURS HERE)
const firebaseConfig = {
 apiKey: "YOUR_KEY",
 authDomain: "YOUR_DOMAIN",
 projectId: "YOUR_ID"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let trades = JSON.parse(localStorage.getItem("t"))||[];

function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function addTrade(){
 let t={
  date:date.value,
  pl:(sell.value-buy.value)*(lot.value||50),
  risk:+risk.value||1
 };

 trades.push(t);
 localStorage.setItem("t",JSON.stringify(trades));
 render();
}

function render(){
 let total=0, win=0, peak=0, dd=0, equity=[];

 trades.forEach(t=>{
  total+=t.pl;
  equity.push(total);

  if(t.pl>0) win++;

  if(total>peak) peak=total;
  let d=peak-total;
  if(d>dd) dd=d;
 });

 pl.innerText=total;
 count.innerText=trades.length;
 win.innerText=((win/trades.length)*100||0).toFixed(0);
 document.getElementById("dd").innerText=dd;

 aiCoach();
 new Chart(equity,{type:"line",data:{labels:eqLabels(equity),datasets:[{data:equity}]}})
}

function eqLabels(eq){
 return eq.map((_,i)=>i+1);
}

// 🤖 REAL AI (ready for API)
function aiCoach(){
 let msg="";

 if(trades.length<5){
  msg="Not enough data yet";
 } else {
  let last=trades.slice(-3);

  if(last.every(t=>t.pl<0)){
   msg="🚨 Stop trading. You are on a loss streak.";
  } else {
   msg="Trading stable. Follow your system.";
  }
 }

 coach.innerText=msg;
}

// ☁️ CLOUD SYNC
async function syncCloud(){
 for(let t of trades){
  await db.collection("trades").add(t);
 }
 alert("Synced to cloud ✅");
}

function clearAll(){
 trades=[];
 localStorage.clear();
 render();
}

render();

if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
