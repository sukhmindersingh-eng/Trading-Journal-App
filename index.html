<!DOCTYPE html>
<html>
<head>
  <title>Trading Journal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h2>Trading Journal</h2>

<input type="date" id="date"><br><br>
<input type="number" id="entry" placeholder="Entry Price"><br><br>
<input type="number" id="exit" placeholder="Exit Price"><br><br>
<input type="text" id="notes" placeholder="Notes"><br><br>

<button onclick="saveTrade()">Save Trade</button>

<h3>Trades</h3>
<ul id="list"></ul>

<script>
function saveTrade() {
  let date = document.getElementById("date").value;
  let entry = document.getElementById("entry").value;
  let exit = document.getElementById("exit").value;
  let notes = document.getElementById("notes").value;

  let trade = { date, entry, exit, notes };

  let trades = JSON.parse(localStorage.getItem("trades")) || [];
  trades.push(trade);

  localStorage.setItem("trades", JSON.stringify(trades));
  displayTrades();
}

function displayTrades() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  let trades = JSON.parse(localStorage.getItem("trades")) || [];

  trades.forEach(t => {
    let li = document.createElement("li");
    li.innerText = `${t.date} | Entry: ${t.entry} | Exit: ${t.exit} | ${t.notes}`;
    list.appendChild(li);
  });
}

displayTrades();
</script>

</body>
</html>
