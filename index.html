<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Trading System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6366f1">

<link rel="apple-touch-icon" href="icon.PNG">
<link rel="apple-touch-icon" sizes="180x180" href="icon.PNG">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:-apple-system; background:#f8fafc; }

.header { text-align:center; padding:12px; font-weight:bold; color:#4f46e5; }

.screen { display:none; padding:12px; }
.active { display:block; }

.card {
 background:white;
 padding:12px;
 border-radius:14px;
 margin-bottom:12px;
}

.grid {
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

input, textarea {
 padding:10px;
 border-radius:10px;
 border:none;
 background:#f1f5f9;
}

button {
 padding:12px;
 border:none;
 border-radius:14px;
 margin-top:8px;
 width:100%;
}

.green { background:#bbf7d0; }
.blue { background:#bfdbfe; }
.red { background:#fecaca; }

.nav {
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 background:white;
}

.nav button { flex:1; }

/* Heatmap */
.day {
 padding:10px;
 border-radius:8px;
 text-align:center;
 font-size:12px;
}

.winDay { background:#bbf7d0; }
.lossDay { background:#fecaca; }
.neutral { background:#e5e7eb; }
</style>
</head>

<body>

<div class="header">💼 Pro Trading System</div>

<!-- DASHBOARD -->
<div id="dash" class="screen active">

<div class="card">
P&L: <b id="pl">0</b><br>
Win%: <b id="win">0</b><br>
Trades: <b id="count">0</b><br>
Max DD: <b id="dd">0</b>
</div>

<div class="card">
<h3>🧠 AI Coach</h3>
<p id="coach"></p>
Score: <b id="score">0</b>
</div>

<div class="card"><canvas id="equityChart"></canvas></div>
<div class="card"><canvas id="dailyChart"></canvas></div>
<div class="card"><canvas id="winChart"></canvas></div>

<div class="card">
<h3>📅 Performance Calendar</h3>
<div id="heatmap" style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;"></div>
</div>

</div>

<!-- ADD -->
<div id="add" class="screen">
<div class="card">

<div class="grid">
<input type="date" id="date">
<input type="number" id="strike" placeholder="Strike">
<input type="number" id="lot" placeholder="Lot (50)">
<input type="number" id="buy" placeholder="Buy">
<input type="number" id="sell" placeholder="Sell">
<textarea id="notes" placeholder="Notes"></textarea>
</div>

<button class="green" onclick="addTrade()">Add Trade</button>
<button class="blue" onclick="exportExcel()">Export Excel</button>
<button class="blue" onclick="exportData()">Backup JSON</button>
<input type="file" id="fileInput" accept=".csv">
<button class="blue" onclick="importCSV()">Import Zerodha CSV</button>
<button class="red" onclick="clearAll()">Reset</button>

</div>
</div>

<div class="nav">
<button onclick="show('dash')">📊</button>
<button onclick="show('add')">➕</button>
</div>

<script>
let trades = JSON.parse(localStorage.getItem("t"))||[];

function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function addTrade(){
 let t={
  date:date.value,
  strike:+strike.value,
  pl:(sell.value-buy.value)*(lot.value||50)
 };
 trades.push(t);
 localStorage.setItem("t",JSON.stringify(trades));
 render();
}

function render(){
 let total=0, win=0, equity=[], dates=[], daily={};
 let peak=0, dd=0;

 trades.forEach(t=>{
  total+=t.pl;
  equity.push(total);
  dates.push(t.date);

  if(t.pl>0) win++;

  daily[t.date]=(daily[t.date]||0)+t.pl;

  if(total>peak) peak=total;
  let draw=peak-total;
  if(draw>dd) dd=draw;
 });

 pl.innerText=total;
 count.innerText=trades.length;
 win.innerText=((win/trades.length)*100||0).toFixed(0);
 document.getElementById("dd").innerText=dd;

 ai();
 renderCharts(dates,equity,daily,win);
 renderHeatmap();
}

function renderCharts(dates,equity,daily,win){
 new Chart(equityChart,{type:"line",data:{labels:dates,datasets:[{data:equity}]}});

 new Chart(dailyChart,{type:"bar",data:{labels:Object.keys(daily),datasets:[{data:Object.values(daily)}]}});

 new Chart(winChart,{type:"pie",data:{labels:["Win","Loss"],datasets:[{data:[win,trades.length-win]}]}});
}

function ai(){
 let score=100, msg=[];
 let lossStreak=0,maxLoss=0,dayMap={};

 trades.forEach(t=>{
  if(t.pl<0){ lossStreak++; if(lossStreak>maxLoss) maxLoss=lossStreak; }
  else lossStreak=0;

  dayMap[t.date]=(dayMap[t.date]||0)+t.pl;
 });

 if(maxLoss>=3){ msg.push("🚨 Loss streak detected"); score-=30; }

 let lossDays = Object.values(dayMap).filter(v=>v<0).length;
 if(lossDays>3){ msg.push("⚠️ Too many red days"); score-=15; }

 coach.innerHTML=msg.join("<br>");
 document.getElementById("score").innerText=score;
}

function exportExcel(){
 let csv="Date,Strike,P&L\n";
 trades.forEach(t=>{
  csv+=`${t.date},${t.strike},${t.pl}\n`;
 });

 let blob=new Blob([csv]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="trades.csv";
 a.click();
}

function exportData(){
 let a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([JSON.stringify(trades)]));
 a.download="backup.json";
 a.click();
}

function importCSV(){
 let file=document.getElementById("fileInput").files[0];
 if(!file) return;

 let reader=new FileReader();
 reader.onload=function(e){
  let rows=e.target.result.split("\n");
  rows.slice(1).forEach(r=>{
   let c=r.split(",");
   if(c.length<6) return;

   trades.push({date:c[0],pl:parseFloat(c[5])||0});
  });

  localStorage.setItem("t",JSON.stringify(trades));
  render();
 };
 reader.readAsText(file);
}

function renderHeatmap(){
 let map={};
 trades.forEach(t=>{
  map[t.date]=(map[t.date]||0)+t.pl;
 });

 let html="";
 Object.keys(map).sort().forEach(d=>{
  let val=map[d];
  let cls="neutral";
  if(val>0) cls="winDay";
  if(val<0) cls="lossDay";

  html+=`<div class="day ${cls}">${d.split("-")[2]}</div>`;
 });

 document.getElementById("heatmap").innerHTML=html;
}

function clearAll(){
 trades=[];
 localStorage.clear();
 render();
}

render();

if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
