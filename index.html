<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trading Journal Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4f46e5">

<!-- iOS -->
<link rel="apple-touch-icon" href="icon.PNG">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#e0e7ff,#f8fafc);
}

.header {
  text-align:center;
  padding:15px;
  font-weight:bold;
  color:#4f46e5;
}

.screen { display:none; padding:15px; }
.active { display:block; }

.card {
  background:white;
  padding:15px;
  border-radius:18px;
  margin-bottom:15px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

input, textarea {
  padding:10px;
  border-radius:10px;
  border:none;
  background:#f1f5f9;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:16px;
  margin-top:10px;
}

.add { background:#bbf7d0; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
}

.nav button { flex:1; }
</style>
</head>

<body>

<div class="header">📊 Trading Journal</div>

<div id="dash" class="screen active">
<div class="card">
P&L: <b id="pl">0</b><br>
Trades: <b id="count">0</b>
</div>
</div>

<div id="add" class="screen">
<div class="card">
<div class="grid">
<input type="date" id="date">
<input type="number" id="strike" placeholder="Strike">
<input type="number" id="buy" placeholder="Buy">
<input type="number" id="sell" placeholder="Sell">
<textarea id="notes" placeholder="Notes"></textarea>
</div>

<button class="add" onclick="addTrade()">Add Trade</button>
</div>
</div>

<div id="journal" class="screen">
<div class="card">
<div id="list"></div>
</div>
</div>

<div class="nav">
<button onclick="show('dash')">🏠</button>
<button onclick="show('add')">➕</button>
<button onclick="show('journal')">📒</button>
</div>

<script>
let trades = JSON.parse(localStorage.getItem("t"))||[];

function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function addTrade(){
 let t={
  date:date.value,
  strike:strike.value,
  buy:+buy.value,
  sell:+sell.value
 };

 t.pl=(t.sell-t.buy)*50;
 trades.push(t);

 localStorage.setItem("t",JSON.stringify(trades));
 render();
 show('dash');
}

function render(){
 let total=0, html="";
 trades.forEach(t=>{
  total+=t.pl;
  html+=`${t.date} | ${t.pl}<br>`;
 });

 pl.innerText=total;
 count.innerText=trades.length;
 list.innerHTML=html;
}

render();

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
