<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal PRO</title>

<style>
body {
  font-family: Arial;
  background: #0f2f2f;
  padding: 20px;
  color: white;
}

h2 { text-align:center; }

/* FORM */
.form {
  background: #1f3f3f;
  padding: 15px;
  border-radius: 10px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

input, select, textarea {
  height: 40px;
  background: #F2CDC5;
  border: none;
  border-radius: 6px;
  padding: 6px;
}

textarea {
  height: 80px;
}

/* BUTTON */
button {
  height: 40px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.save-btn { background:#c16a63; color:white; }
.download-btn { background:#6b8e8e; color:white; }

/* TABLE */
table {
  width: 100%;
  margin-top: 20px;
  border-spacing: 6px;
}

th {
  background: #B97A71;
  color: white;
  padding: 10px;
}

td {
  background: #F2CDC5;
  color: black;
  padding: 10px;
  text-align: center;
}

.profit { color: green; font-weight: bold; }
.loss { color: red; font-weight: bold; }

/* ACTION BUTTONS */
.action-btn {
  padding: 5px 8px;
  margin: 2px;
  border-radius: 4px;
  border: none;
  cursor: pointer;
}

.edit-btn { background: green; color: white; }
.delete-btn { background: red; color: white; }

</style>
</head>

<body>

<h2>📊 Trading Journal</h2>

<input type="hidden" id="editIndex">

<div class="form">

<input type="date" id="date">
<input type="text" id="day" placeholder="Day">

<select id="underlying">
<option>NIFTY</option>
<option>SENSEX</option>
</select>

<input type="number" id="strike" placeholder="Strike">
<input type="number" id="qty" placeholder="Qty">
<input type="number" id="buyPrice" placeholder="Buy Price">
<input type="number" id="sellPrice" placeholder="Sell Price">

<input type="text" id="strategy" placeholder="Strategy">
<textarea id="remarks" placeholder="Remarks"></textarea>

<button class="save-btn" onclick="saveTrade()">Save Trade</button>
<button class="download-btn" onclick="downloadCSV()">Download Excel</button>

</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Day</th>
<th>Underlying</th>
<th>Strike</th>
<th>Qty</th>
<th>Buy</th>
<th>Sell</th>
<th>P/L</th>
<th>%</th>
<th>Strategy</th>
<th>Remarks</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>
function saveTrade() {
  let trades = JSON.parse(localStorage.getItem("trades") || "[]");

  let t = {
    date: new Date(date.value).toLocaleDateString("en-GB"),
    day: day.value,
    underlying: underlying.value,
    strike: strike.value,
    qty: Number(qty.value),
    buy: Number(buyPrice.value),
    sell: Number(sellPrice.value),
    strategy: strategy.value,
    remarks: remarks.value
  };

  t.pl = (t.sell - t.buy) * t.qty;
  t.percent = ((t.pl/(t.buy*t.qty))*100 || 0).toFixed(2);

  if (editIndex.value !== "") {
    trades[editIndex.value] = t;
    editIndex.value = "";
  } else {
    trades.push(t);
  }

  localStorage.setItem("trades", JSON.stringify(trades));
  render();
  resetForm();
}

function render() {
  let trades = JSON.parse(localStorage.getItem("trades") || "[]");
  let tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  trades.forEach((t,i) => {
    let row = document.createElement("tr");

    row.innerHTML = `
<td>${t.date}</td>
<td>${t.day}</td>
<td>${t.underlying}</td>
<td>${t.strike}</td>
<td>${t.qty}</td>
<td>${t.buy}</td>
<td>${t.sell}</td>
<td class="${t.pl>=0?'profit':'loss'}">${t.pl}</td>
<td>${t.percent}%</td>
<td>${t.strategy}</td>
<td>${t.remarks}</td>
<td>
<button class="action-btn edit-btn" onclick="editTrade(${i})">Edit</button>
<button class="action-btn delete-btn" onclick="deleteTrade(${i})">Delete</button>
</td>
`;

    tbody.appendChild(row);
  });
}

function editTrade(i){
  let t = JSON.parse(localStorage.getItem("trades"))[i];

  day.value = t.day;
  underlying.value = t.underlying;
  strike.value = t.strike;
  qty.value = t.qty;
  buyPrice.value = t.buy;
  sellPrice.value = t.sell;
  strategy.value = t.strategy;
  remarks.value = t.remarks;

  editIndex.value = i;
}

function deleteTrade(i){
  if (!confirm("Delete this trade?")) return;

  let trades = JSON.parse(localStorage.getItem("trades"));
  trades.splice(i,1);
  localStorage.setItem("trades", JSON.stringify(trades));
  render();
}

function resetForm(){
  document.querySelectorAll("input, textarea").forEach(el=>el.value="");
  editIndex.value="";
}

function downloadCSV(){
  let trades = JSON.parse(localStorage.getItem("trades") || []);
  let csv = "Date,Day,Underlying,Strike,Qty,Buy,Sell,P/L,%,Strategy,Remarks\n";

  trades.forEach(t=>{
    csv += `${t.date},${t.day},${t.underlying},${t.strike},${t.qty},${t.buy},${t.sell},${t.pl},${t.percent},${t.strategy},${t.remarks}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "trades.csv";
  a.click();
}

render();
</script>

</body>
</html>
