<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elite Trading Journal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  padding:15px;
}

h1 { text-align:center; color:#22c55e; }

.container { max-width:1100px; margin:auto; }

.card {
  background: rgba(30,41,59,0.9);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.row {
  display:flex;
  gap:10px;
  margin-top:10px;
}

.row button {
  flex:1;
}

input, select, textarea {
  width:100%;
  padding:8px;
  border-radius:6px;
  border:none;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.add { background:#22c55e; }
.export { background:#38bdf8; }
.clear { background:#ef4444; }

.stats {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.stat {
  background:#020617;
  padding:10px;
  text-align:center;
  border-radius:8px;
}

table {
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

th,td {
  padding:8px;
  border-bottom:1px solid #334155;
  text-align:center;
}

.profit { color:#22c55e; }
.loss { color:#ef4444; }

canvas {
  background:#020617;
  border-radius:10px;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
<h1>🚀 Elite Trading Journal</h1>

<div class="card grid">
<input type="date" id="date">
<select id="type">
<option>CE</option><option>PE</option>
</select>

<input type="number" id="strike" placeholder="Strike Price">
<input type="number" id="lot" placeholder="Lot Size (Auto 50)">

<input type="time" id="buyTime">
<input type="time" id="sellTime">

<input type="number" id="buy" placeholder="Buy Premium">
<input type="number" id="sell" placeholder="Sell Premium">

<select id="strategy">
<option>Breakout</option>
<option>Reversal</option>
<option>VWAP</option>
<option>Support/Resistance</option>
</select>

<textarea id="notes" placeholder="Notes"></textarea>
</div>

<!-- 3 BUTTON ROWS -->
<div class="row">
<button class="add" onclick="addTrade()">Add Trade</button>
</div>

<div class="row">
<button class="export" onclick="exportCSV()">Export CSV</button>
</div>

<div class="row">
<button class="clear" onclick="clearAll()">Clear All</button>
</div>

<div class="stats">
<div class="stat"><h3>Total P&L</h3><p id="totalPL">0</p></div>
<div class="stat"><h3>Win Rate</h3><p id="winRate">0%</p></div>
<div class="stat"><h3>Trades</h3><p id="trades">0</p></div>
<div class="stat"><h3>Avg Win</h3><p id="avgWin">0</p></div>
<div class="stat"><h3>Avg Loss</h3><p id="avgLoss">0</p></div>
<div class="stat"><h3>RR</h3><p id="rr">0</p></div>
</div>

<canvas id="chart" height="100"></canvas>

<table>
<thead>
<tr>
<th>Date</th><th>Type</th><th>Strike</th><th>Lot</th>
<th>Buy</th><th>Sell</th><th>P&L</th><th>X</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

</div>

<script>
let trades = JSON.parse(localStorage.getItem("trades")) || [];

function addTrade(){
  let lotVal = +lot.value || 50;

  let t = {
    date:date.value,
    type:type.value,
    strike:+strike.value,
    lot:lotVal,
    buy:+buy.value,
    sell:+sell.value,
    strategy:strategy.value
  };

  let pl = (t.sell - t.buy)*t.lot - (t.buy+t.sell)*t.lot*0.002;
  t.pl = pl;

  trades.push(t);
  localStorage.setItem("trades",JSON.stringify(trades));
  render();
}

function del(i){
  trades.splice(i,1);
  localStorage.setItem("trades",JSON.stringify(trades));
  render();
}

function clearAll(){
  if(confirm("Clear all trades?")){
    trades=[];
    localStorage.clear();
    render();
  }
}

function render(){
  let html="", total=0, win=0, eq=[];

  trades.forEach((t,i)=>{
    total+=t.pl;
    eq.push(total);
    if(t.pl>0) win++;

    html+=`
    <tr>
      <td>${t.date}</td>
      <td>${t.type}</td>
      <td>${t.strike}</td>
      <td>${t.lot}</td>
      <td>${t.buy}</td>
      <td>${t.sell}</td>
      <td class="${t.pl>=0?'profit':'loss'}">${t.pl.toFixed(2)}</td>
      <td><button onclick="del(${i})">X</button></td>
    </tr>`;
  });

  body.innerHTML=html;
  totalPL.innerText=total.toFixed(2);
  tradesEl.innerText=trades.length;
  winRate.innerText = trades.length ? ((win/trades.length)*100).toFixed(1)+"%" : "0%";

  drawChart(eq);
}

function drawChart(data){
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  ctx.beginPath();
  ctx.strokeStyle="#22c55e";

  data.forEach((v,i)=>{
    let x=i*(c.width/data.length);
    let y=c.height - (v/Math.max(...data))*c.height;
    if(i==0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.stroke();
}

function exportCSV(){
  let csv="Date,Type,Strike,Lot,Buy,Sell,PnL\n";
  trades.forEach(t=>{
    csv+=`${t.date},${t.type},${t.strike},${t.lot},${t.buy},${t.sell},${t.pl}\n`;
  });

  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="journal.csv";
  a.click();
}

render();
</script>

</body>
</html>
