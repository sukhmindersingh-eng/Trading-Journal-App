<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nifty Options Trading Journal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #38bdf8;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #334155;
    }

    .profit {
      color: #22c55e;
    }

    .loss {
      color: #ef4444;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .stat-box {
      background: #020617;
      padding: 10px;
      border-radius: 8px;
      width: 30%;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>📊 Nifty Options Trading Journal</h1>

  <div class="card">
    <input type="date" id="date">
    <select id="type">
      <option value="CE">Call (CE)</option>
      <option value="PE">Put (PE)</option>
    </select>
    <input type="number" id="lot" placeholder="Lot Size (e.g. 50)">
    <input type="number" id="buy" placeholder="Buy Premium">
    <input type="number" id="sell" placeholder="Sell Premium">
    <button onclick="addTrade()">Add Trade</button>
  </div>

  <div class="stats">
    <div class="stat-box">
      <h3>Total P&L</h3>
      <p id="totalPL">0</p>
    </div>
    <div class="stat-box">
      <h3>Win Rate</h3>
      <p id="winRate">0%</p>
    </div>
    <div class="stat-box">
      <h3>Total Trades</h3>
      <p id="totalTrades">0</p>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Type</th>
        <th>Lot</th>
        <th>Buy</th>
        <th>Sell</th>
        <th>P&L</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
let trades = JSON.parse(localStorage.getItem("trades")) || [];

function addTrade() {
  let date = document.getElementById("date").value;
  let type = document.getElementById("type").value;
  let lot = parseFloat(document.getElementById("lot").value);
  let buy = parseFloat(document.getElementById("buy").value);
  let sell = parseFloat(document.getElementById("sell").value);

  if (!date || !lot || !buy || !sell) {
    alert("Please fill all fields");
    return;
  }

  let pl = (sell - buy) * lot;

  trades.push({ date, type, lot, buy, sell, pl });
  localStorage.setItem("trades", JSON.stringify(trades));

  render();
}

function render() {
  let tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  let totalPL = 0;
  let wins = 0;

  trades.forEach(t => {
    totalPL += t.pl;
    if (t.pl > 0) wins++;

    let row = `
      <tr>
        <td>${t.date}</td>
        <td>${t.type}</td>
        <td>${t.lot}</td>
        <td>${t.buy}</td>
        <td>${t.sell}</td>
        <td class="${t.pl >= 0 ? 'profit' : 'loss'}">${t.pl}</td>
      </tr>
    `;
    tbody.innerHTML += row;
  });

  document.getElementById("totalPL").innerText = totalPL.toFixed(2);
  document.getElementById("totalTrades").innerText = trades.length;
  document.getElementById("winRate").innerText =
    trades.length ? ((wins / trades.length) * 100).toFixed(1) + "%" : "0%";
}

render();
</script>

</body>
</html>
