<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trading Journal Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:linear-gradient(135deg,#e0e7ff,#f8fafc);
  color:#0f172a;
}

/* HEADER */
.header {
  text-align:center;
  padding:15px;
  font-weight:bold;
  font-size:20px;
  color:#4f46e5;
}

/* SCREEN */
.screen { display:none; padding:15px; }
.active { display:block; }

/* CARD */
.card {
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(20px);
  padding:15px;
  border-radius:20px;
  margin-bottom:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* INPUT */
input, select, textarea {
  padding:12px;
  border:none;
  border-radius:14px;
  background:#f1f5f9;
}

/* BUTTON */
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:18px;
  font-weight:600;
  margin-top:10px;
}

.add { background:#bbf7d0; }
.clear { background:#fecaca; }

/* STATS */
.stats {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.stat {
  background:white;
  padding:12px;
  border-radius:14px;
  text-align:center;
}

/* TABLE */
table { width:100%; border-collapse:collapse; }
td { padding:8px; border-bottom:1px solid #ddd; }

/* NAVBAR */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

.nav button {
  flex:1;
  background:none;
  font-size:16px;
}
</style>
</head>

<body>

<div class="header">📊 Trading Journal</div>

<!-- DASHBOARD -->
<div id="dash" class="screen active">
<div class="card stats">
<div class="stat">P&L<br><b id="pl">0</b></div>
<div class="stat">Win%<br><b id="win">0</b></div>
<div class="stat">Trades<br><b id="count">0</b></div>
<div class="stat">DD<br><b id="dd">0</b></div>
</div>

<div class="card">
<h3>🧠 AI Coach</h3>
<p id="coach"></p>
<p>Score: <span id="score"></span></p>
</div>
</div>

<!-- ADD TRADE -->
<div id="add" class="screen">
<div class="card">
<div class="grid">
<input type="date" id="date">
<input type="number" id="strike" placeholder="Strike">

<input type="number" id="lot" placeholder="Lot">
<input type="number" id="buy" placeholder="Buy">

<input type="number" id="sell" placeholder="Sell">
<textarea id="notes" placeholder="Notes"></textarea>
</div>

<button class="add" onclick="addTrade()">Add Trade</button>
<button class="clear" onclick="clearAll()">Clear</button>
</div>
</div>

<!-- JOURNAL -->
<div id="journal" class="screen">
<div class="card">
<table>
<tbody id="body"></tbody>
</table>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('dash')">🏠</button>
<button onclick="show('add')">➕</button>
<button onclick="show('journal')">📒</button>
</div>

<script>
let trades = JSON.parse(localStorage.getItem("t"))||[];

function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function addTrade(){
 let t={
  date:date.value,
  strike:+strike.value,
  lot:+lot.value||50,
  buy:+buy.value,
  sell:+sell.value,
  notes:notes.value
 };

 t.pl=(t.sell-t.buy)*t.lot;

 trades.push(t);
 localStorage.setItem("t",JSON.stringify(trades));
 render();
 show('dash');
}

function render(){
 let total=0, win=0, max=0, dd=0, html="";

 trades.forEach((t,i)=>{
  total+=t.pl;
  max=Math.max(max,total);
  dd=Math.min(dd,total-max);

  if(t.pl>0) win++;

  html+=`<tr>
  <td>${t.date}</td>
  <td>${t.pl}</td>
  <td><button onclick="del(${i})">❌</button></td>
  </tr>`;
 });

 body.innerHTML=html;
 pl.innerText=total;
 count.innerText=trades.length;
 win.innerText=((win/trades.length)*100||0).toFixed(0);
 dd.innerText=dd;

 ai();
}

function ai(){
 if(!trades.length) return;
 let last=trades[trades.length-1];
 let score=100, msg=[];

 if(last.pl<0){ msg.push("Loss trade"); score-=10; }
 if(!last.notes){ msg.push("Add notes"); score-=10; }

 coach.innerHTML=msg.join("<br>");
 score.innerText=score;
}

function del(i){
 trades.splice(i,1);
 localStorage.setItem("t",JSON.stringify(trades));
 render();
}

function clearAll(){
 trades=[];
 localStorage.clear();
 render();
}

render();
</script>

</body>
</html>
