<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nifty Options Trading Journal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 30px;
    }

    h3 {
      margin: 0 0 10px 0;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 25px;
    }

    .form-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    input, select, button {
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
    }

    button {
      background: #38bdf8;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      border: none;
      grid-column: 1 / -1;
    }

    button:hover {
      background: #0ea5e9;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .delete-btn {
      background: #ef4444;
      color: #fff;
      padding: 6px 12px;
      width: auto;
      grid-column: unset;
      font-size: 0.85rem;
      border-radius: 4px;
    }

    .delete-btn:hover {
      background: #dc2626;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .stat-box {
      background: #020617;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      border-left: 4px solid #38bdf8;
    }

    .stat-box p {
      font-size: 2rem;
      font-weight: bold;
      margin: 10px 0 0 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      overflow-x: auto;
    }

    thead {
      background: #1e293b;
    }

    th {
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid #334155;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    tr:hover {
      background: rgba(56, 189, 248, 0.05);
    }

    .profit {
      color: #22c55e;
      font-weight: 600;
    }

    .loss {
      color: #ef4444;
      font-weight: 600;
    }

    .error {
      color: #ef4444;
      font-size: 0.9rem;
      margin-top: 5px;
      display: none;
    }

    .error.show {
      display: block;
    }

    @media (max-width: 768px) {
      .form-group {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 0.9rem;
      }

      th, td {
        padding: 8px 4px;
      }

      .delete-btn {
        padding: 4px 8px;
        font-size: 0.75rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .card {
        padding: 15px;
      }

      h1 {
        font-size: 1.5rem;
      }

      table {
        font-size: 0.8rem;
      }

      th, td {
        padding: 6px 2px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>📊 Nifty Options Trading Journal</h1>

  <div class="card">
    <div class="form-group">
      <div>
        <input type="date" id="date">
      </div>
      <div>
        <select id="type">
          <option value="CE">Call (CE)</option>
          <option value="PE">Put (PE)</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <input type="number" id="lot" placeholder="Lot Size (e.g. 50)" step="1" min="1">
      <input type="number" id="buy" placeholder="Buy Premium" step="0.01" min="0">
    </div>
    <div class="form-group">
      <input type="number" id="sell" placeholder="Sell Premium" step="0.01" min="0">
    </div>
    <button onclick="addTrade()">Add Trade</button>
    <div class="error" id="errorMsg"></div>
  </div>

  <div class="stats">
    <div class="stat-box">
      <h3>Total P&L</h3>
      <p id="totalPL">₹0</p>
    </div>
    <div class="stat-box">
      <h3>Win Rate</h3>
      <p id="winRate">0%</p>
    </div>
    <div class="stat-box">
      <h3>Total Trades</h3>
      <p id="totalTrades">0</p>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Type</th>
        <th>Lot</th>
        <th>Buy</th>
        <th>Sell</th>
        <th>P&L</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
  // Initialize trades from localStorage with error handling
  let trades = [];
  function loadTrades() {
    try {
      trades = JSON.parse(localStorage.getItem("trades")) || [];
    } catch (e) {
      console.error("Error loading trades from localStorage:", e);
      trades = [];
      showError("Could not load trades. Starting fresh.");
    }
  }

  loadTrades();

  // Set today's date as default
  document.getElementById("date").valueAsDate = new Date();

  function showError(message) {
    const errorEl = document.getElementById("errorMsg");
    errorEl.textContent = message;
    errorEl.classList.add("show");
    setTimeout(() => errorEl.classList.remove("show"), 4000);
  }

  function saveTrades() {
    try {
      localStorage.setItem("trades", JSON.stringify(trades));
    } catch (e) {
      console.error("Error saving trades to localStorage:", e);
      showError("Could not save trades. Your data may be lost.");
    }
  }

  function validateTrade(date, lot, buy, sell) {
    if (!date) return "Please select a date";
    if (!lot || lot <= 0 || !Number.isFinite(lot)) return "Lot size must be a positive number";
    if (!Number.isFinite(buy) || buy < 0) return "Buy premium must be a non-negative number";
    if (!Number.isFinite(sell) || sell < 0) return "Sell premium must be a non-negative number";
    return null;
  }

  function addTrade() {
    const date = document.getElementById("date").value;
    const type = document.getElementById("type").value;
    const lot = parseFloat(document.getElementById("lot").value);
    const buy = parseFloat(document.getElementById("buy").value);
    const sell = parseFloat(document.getElementById("sell").value);

    const error = validateTrade(date, lot, buy, sell);
    if (error) {
      showError(error);
      return;
    }

    const pl = (sell - buy) * lot;
    trades.push({ date, type, lot, buy, sell, pl });
    saveTrades();

    // Clear form
    document.getElementById("date").valueAsDate = new Date();
    document.getElementById("lot").value = "";
    document.getElementById("buy").value = "";
    document.getElementById("sell").value = "";
    document.getElementById("type").value = "CE";

    render();
  }

  function deleteTrade(index) {
    if (confirm("Are you sure you want to delete this trade?")) {
      trades.splice(index, 1);
      saveTrades();
      render();
    }
  }

  function render() {
    const tbody = document.getElementById("tableBody");
    let html = "";

    let totalPL = 0;
    let wins = 0;

    trades.forEach((t, index) => {
      totalPL += t.pl;
      if (t.pl > 0) wins++;

      const plClass = t.pl >= 0 ? "profit" : "loss";
      const plSign = t.pl >= 0 ? "+" : "";
      
      html += `
        <tr>
          <td>${t.date}</td>
          <td>${t.type}</td>
          <td>${t.lot}</td>
          <td>₹${t.buy.toFixed(2)}</td>
          <td>₹${t.sell.toFixed(2)}</td>
          <td class="${plClass}">${plSign}₹${t.pl.toFixed(2)}</td>
          <td><button class="delete-btn" onclick="deleteTrade(${index})">Delete</button></td>
        </tr>
      `;
    });

    tbody.innerHTML = html;

    // Update stats - use textContent for better security and performance
    document.getElementById("totalPL").textContent = 
      (totalPL >= 0 ? "+" : "") + "₹" + totalPL.toFixed(2);
    document.getElementById("totalTrades").textContent = trades.length;
    document.getElementById("winRate").textContent =
      trades.length ? ((wins / trades.length) * 100).toFixed(1) + "%" : "0%";
  }

  // Initial render
  render();

  // Handle Enter key on form inputs
  document.querySelectorAll("input, select").forEach(el => {
    el.addEventListener("keypress", (e) => {
      if (e.key === "Enter") addTrade();
    });
  });
</script>

</body>
</html>
