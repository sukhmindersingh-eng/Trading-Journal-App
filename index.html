<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prop Trading System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6366f1">

<link rel="apple-touch-icon" href="icon.PNG">
<link rel="apple-touch-icon" sizes="180x180" href="icon.PNG">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:-apple-system; background:#f8fafc; }

.header { text-align:center; padding:12px; font-weight:600; color:#4f46e5; }

.screen { display:none; padding:12px; }
.active { display:block; }

.card {
 background:white;
 padding:12px;
 border-radius:14px;
 margin-bottom:12px;
}

.grid {
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

input, select, textarea {
 padding:10px;
 border-radius:10px;
 border:none;
 background:#f1f5f9;
}

button {
 padding:12px;
 border:none;
 border-radius:14px;
 margin-top:8px;
 width:100%;
}

.green { background:#bbf7d0; }
.blue { background:#bfdbfe; }
.red { background:#fecaca; }

.nav {
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 background:white;
}
.nav button { flex:1; }

.day { padding:8px; border-radius:6px; font-size:11px; text-align:center; }
.winDay { background:#bbf7d0; }
.lossDay { background:#fecaca; }
</style>
</head>

<body>

<div class="header">💼 Prop Trading System</div>

<!-- DASHBOARD -->
<div id="dash" class="screen active">

<div class="card">
P&L: <b id="pl">0</b><br>
Win%: <b id="win">0</b><br>
Trades: <b id="count">0</b><br>
Max DD: <b id="dd">0</b><br>
Best Strategy: <b id="bestStrat">-</b>
</div>

<div class="card">
<h3>🧠 AI Coach</h3>
<p id="coach"></p>
Score: <b id="score">0</b>
</div>

<div class="card"><canvas id="equity"></canvas></div>

<div class="card">
<h3>📅 Heatmap</h3>
<div id="heatmap" style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;"></div>
</div>

</div>

<!-- ADD -->
<div id="add" class="screen">
<div class="card">

<div class="grid">
<input type="date" id="date">
<input type="number" id="strike" placeholder="Strike">

<input type="number" id="lot" placeholder="Lot">
<input type="number" id="buy" placeholder="Buy">

<input type="number" id="sell" placeholder="Sell">
<input type="number" id="risk" placeholder="Risk ₹">

<select id="strategy">
<option>Breakout</option>
<option>Reversal</option>
<option>Scalping</option>
</select>

<input type="text" id="setup" placeholder="Setup Name">

<input type="text" id="screenshot" placeholder="Screenshot URL">
<textarea id="notes" placeholder="Notes"></textarea>
</div>

<button class="green" onclick="addTrade()">Add Trade</button>
<button class="blue" onclick="exportExcel()">Export Excel</button>
<input type="file" id="fileInput" accept=".csv">
<button class="blue" onclick="importCSV()">Import CSV</button>
<button class="red" onclick="clearAll()">Reset</button>

</div>
</div>

<div class="nav">
<button onclick="show('dash')">📊</button>
<button onclick="show('add')">➕</button>
</div>

<script>
let trades = JSON.parse(localStorage.getItem("t"))||[];

function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function addTrade(){
 let t={
  date:date.value,
  strategy:strategy.value,
  risk:+risk.value||1,
  pl:(sell.value-buy.value)*(lot.value||50)
 };

 t.rMultiple = t.pl / t.risk;

 trades.push(t);
 localStorage.setItem("t",JSON.stringify(trades));
 render();
}

function render(){
 let total=0, win=0, peak=0, dd=0, equity=[];
 let stratMap={}, dayMap={};

 trades.forEach(t=>{
  total+=t.pl;
  equity.push(total);

  if(t.pl>0) win++;

  stratMap[t.strategy]=(stratMap[t.strategy]||0)+t.pl;
  dayMap[t.date]=(dayMap[t.date]||0)+t.pl;

  if(total>peak) peak=total;
  let d=peak-total;
  if(d>dd) dd=d;
 });

 pl.innerText=total;
 count.innerText=trades.length;
 win.innerText=((win/trades.length)*100||0).toFixed(0);
 document.getElementById("dd").innerText=dd;

 // best strategy
 let best = Object.entries(stratMap).sort((a,b)=>b[1]-a[1])[0];
 bestStrat.innerText = best ? best[0] : "-";

 ai(dayMap);
 renderChart(equity);
 renderHeatmap(dayMap);
}

function renderChart(eq){
 new Chart(equity,{type:"line",data:{labels:eq.map((_,i)=>i+1),datasets:[{data:eq}]}})
}

function ai(dayMap){
 let score=100, msg=[];

 let lossDays = Object.values(dayMap).filter(v=>v<0).length;
 if(lossDays>3){ msg.push("⚠️ Too many losing days"); score-=20; }

 let last = trades.slice(-3);
 if(last.every(t=>t.pl<0)){
  msg.push("🚨 Stop trading — loss streak");
  score-=30;
 }

 coach.innerHTML=msg.join("<br>");
 document.getElementById("score").innerText=score;
}

function renderHeatmap(dayMap){
 let html="";
 Object.keys(dayMap).forEach(d=>{
  let val=dayMap[d];
  let cls=val>0?"winDay":"lossDay";
  html+=`<div class="day ${cls}">${d.split("-")[2]}</div>`;
 });
 document.getElementById("heatmap").innerHTML=html;
}

function exportExcel(){
 let csv="Date,Strategy,P&L,R\n";
 trades.forEach(t=>{
  csv+=`${t.date},${t.strategy},${t.pl},${t.rMultiple}\n`;
 });
 let a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([csv]));
 a.download="trades.csv";
 a.click();
}

function importCSV(){
 let file=fileInput.files[0];
 if(!file) return;

 let reader=new FileReader();
 reader.onload=e=>{
  let rows=e.target.result.split("\n");
  rows.slice(1).forEach(r=>{
   let c=r.split(",");
   if(c.length<6) return;
   trades.push({date:c[0],pl:parseFloat(c[5])||0});
  });
  localStorage.setItem("t",JSON.stringify(trades));
  render();
 };
 reader.readAsText(file);
}

function clearAll(){
 trades=[];
 localStorage.clear();
 render();
}

render();

if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
