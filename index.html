<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal PRO</title>

<style>
:root {
  --bg-dark: #0f2f2f;
  --card: #1f3f3f;
  --field: #F2CDC5;
  --header: #B97A71;
}

body {
  font-family: Arial;
  background: var(--bg-dark);
  padding: 20px;
  color: #cbd5d5;
}

.form {
  background: var(--card);
  padding: 20px;
  border-radius: 10px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

input, select {
  height: 40px;
  background: var(--field);
  border: none;
  border-radius: 6px;
  padding: 5px;
}

button {
  height: 40px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.save-btn { background: #c16a63; color: white; }
.download-btn { background: #6b8e8e; color: white; }

table {
  width: 100%;
  margin-top: 20px;
  border-spacing: 6px;
}

th {
  background: var(--header);
  color: white;
  padding: 10px;
}

td {
  background: var(--field);
  color: black;
  padding: 10px;
  text-align: center;
}

/* BUTTONS */
.edit-btn {
  background: green;
  color: white;
  padding: 5px;
}

.delete-btn {
  background: red;
  color: white;
  padding: 5px;
}
</style>
</head>

<body>

<h2>Trading Journal</h2>

<input type="hidden" id="editIndex">

<div class="form">
<input type="date" id="date">
<input type="text" id="day" placeholder="Day">

<select id="underlying">
<option>NIFTY</option>
<option>SENSEX</option>
</select>

<input type="number" id="strike" placeholder="Strike">
<input type="number" id="qty" placeholder="Qty">
<input type="number" id="buyPrice" placeholder="Buy">
<input type="number" id="sellPrice" placeholder="Sell">
<input type="text" id="strategy" placeholder="Strategy">

<button class="save-btn" onclick="saveTrade()">Save</button>
<button class="download-btn" onclick="downloadCSV()">Excel</button>
</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Day</th>
<th>Underlying</th>
<th>Strike</th>
<th>Qty</th>
<th>Buy</th>
<th>Sell</th>
<th>P/L</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tradeTable"></tbody>
</table>

<script>
function saveTrade() {
  let trades = JSON.parse(localStorage.getItem("trades")) || [];

  let trade = {
    date: date.value,
    day: day.value,
    underlying: underlying.value,
    strike: strike.value,
    qty: qty.value,
    buy: buyPrice.value,
    sell: sellPrice.value
  };

  trade.pl = (trade.sell - trade.buy) * trade.qty;

  if (editIndex.value !== "") {
    trades[editIndex.value] = trade;
    editIndex.value = "";
  } else {
    trades.push(trade);
  }

  localStorage.setItem("trades", JSON.stringify(trades));
  displayTrades();
}

function displayTrades() {
  let trades = JSON.parse(localStorage.getItem("trades")) || [];
  let table = document.getElementById("tradeTable");
  table.innerHTML = "";

  trades.forEach((t, i) => {
    let row = document.createElement("tr");

    row.innerHTML = `
      <td>${t.date}</td>
      <td>${t.day}</td>
      <td>${t.underlying}</td>
      <td>${t.strike}</td>
      <td>${t.qty}</td>
      <td>${t.buy}</td>
      <td>${t.sell}</td>
      <td>${t.pl}</td>
      <td>
        <button class="edit-btn" onclick="editTrade(${i})">Edit</button>
        <button class="delete-btn" onclick="deleteTrade(${i})">Delete</button>
      </td>
    `;

    table.appendChild(row);
  });
}

function editTrade(i) {
  let trades = JSON.parse(localStorage.getItem("trades"));
  let t = trades[i];

  date.value = t.date;
  day.value = t.day;
  underlying.value = t.underlying;
  strike.value = t.strike;
  qty.value = t.qty;
  buyPrice.value = t.buy;
  sellPrice.value = t.sell;

  editIndex.value = i;
}

/* 🔥 FIXED DELETE */
function deleteTrade(i) {
  if (!confirm("Delete this trade?")) return;

  let trades = JSON.parse(localStorage.getItem("trades")) || [];
  trades.splice(i, 1);
  localStorage.setItem("trades", JSON.stringify(trades));

  displayTrades();
}

function downloadCSV() {
  let trades = JSON.parse(localStorage.getItem("trades")) || [];
  let csv = "Date,Day,Underlying,Strike,Qty,Buy,Sell,P/L\n";

  trades.forEach(t => {
    csv += `${t.date},${t.day},${t.underlying},${t.strike},${t.qty},${t.buy},${t.sell},${t.pl}\n`;
  });

  let blob = new Blob([csv], { type: "text/csv" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "trades.csv";
  a.click();
}

displayTrades();
</script>

</body>
</html>
